# Next.js code_path_patterns preset
# Copy relevant sections into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  - intent: validation
    kb_target: "validation/common.md"
    paths:
      - "src/lib/validators/**"
      - "src/utils/validators/**"
      - "lib/validators/**"

  - intent: form
    kb_target: "features/{name}.md"
    paths:
      - "src/components/**Form*"
      - "src/app/**/components/**Form*"
    name_extraction:
      strip_suffix: [Form, Screen, Page, View, Container]
      case: kebab

  - intent: api-contract
    kb_target: "features/{name}.api.md"
    paths:
      - "src/app/api/**"
      - "pages/api/**"
      - "app/api/**"
    name_extraction:
      strip_suffix: [route, handler]
      case: kebab

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "src/lib/db/**"
      - "src/models/**"
      - "prisma/**"
      - "lib/db/**"

  - intent: service-logic
    kb_target: "flows/{name}.md"
    paths:
      - "src/lib/services/**"
      - "src/services/**"
      - "lib/services/**"

  - intent: route-guard
    kb_target: "flows/{name}.guards.md"
    paths:
      - "src/middleware.ts"
      - "src/middleware.js"
      - "middleware.ts"
      - "middleware.js"

  - intent: component
    kb_target: "ui/components.md"
    paths:
      - "src/components/**"
      - "src/app/**/components/**"
      - "components/**"

  - intent: dependency
    kb_target: "foundation/tech-stack.md"
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".node-version"

  - intent: config
    kb_target: "foundation/conventions.md"
    paths:
      - "tsconfig.json"
      - "tsconfig.*.json"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "next.config.*"
