# Go backend code_path_patterns preset
# Works with standard Go project layouts (github.com/golang-standards/project-layout)
# Copy relevant sections into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  - intent: validation
    kb_target: "data/validation/common.md"
    paths:
      - "internal/**/validator/**"
      - "internal/**/validation/**"
      - "pkg/**/validator/**"
      - "internal/**/*_validator.go"
      - "internal/**/*_validation.go"
      # Flat layout (e.g. backend/validators/foo.go) — both subdir-nested
      # and direct-child variants since globMatch requires explicit
      # separators between ** segments.
      - "**/validators/*.go"
      - "**/validators/**/*.go"
      - "**/validation/*.go"
      - "**/validation/**/*.go"

  - intent: api-contract
    kb_target: "specs/features/{name}.api.md"
    paths:
      - "internal/**/handler/**"
      - "internal/**/handlers/**"
      - "internal/**/*_handler.go"
      - "internal/**/controller/**"
      - "internal/**/*_controller.go"
      - "api/**/*.go"
      # Flat layout (e.g. backend/handlers/foo.go)
      - "**/handlers/*.go"
      - "**/handlers/**/*.go"
      - "**/handler/*.go"
      - "**/handler/**/*.go"
      - "**/controllers/*.go"
      - "**/controllers/**/*.go"
      - "**/controller/*.go"
      - "**/controller/**/*.go"
    name_extraction:
      strip_suffix: [Handler, Controller, Resource]
      case: kebab

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "internal/**/model/**"
      - "internal/**/models/**"
      - "internal/**/*_model.go"
      - "internal/**/entity/**"
      - "internal/**/*_entity.go"
      - "internal/**/domain/**"
      # Flat layout (e.g. backend/models/foo.go)
      - "**/models/*.go"
      - "**/models/**/*.go"
      - "**/model/*.go"
      - "**/model/**/*.go"
    name_extraction:
      strip_suffix: [Model, Entity]
      case: kebab

  - intent: migration
    kb_target: "data/schema/migrations.md"
    paths:
      - "db/migrations/**"
      - "migrations/**"

  - intent: service-logic
    kb_target: "specs/flows/{name}.md"
    paths:
      - "internal/**/service/**"
      - "internal/**/services/**"
      - "internal/**/*_service.go"
      - "internal/**/usecase/**"
      - "internal/**/*_usecase.go"
      # Flat layout (e.g. backend/services/foo.go)
      - "**/services/*.go"
      - "**/services/**/*.go"
      - "**/service/*.go"
      - "**/service/**/*.go"
    name_extraction:
      strip_suffix: [Service, Usecase, UseCase]
      case: kebab

  - intent: route-guard
    kb_target: "specs/flows/{name}.guards.md"
    paths:
      - "internal/**/middleware/**"
      - "internal/**/*_middleware.go"
      - "internal/**/auth/**"
      - "internal/**/*_auth.go"
      # Flat layout
      - "**/middleware/*.go"
      - "**/middleware/**/*.go"

  - intent: repository
    kb_target: "data/schema/{name}.md"
    paths:
      - "internal/**/repository/**"
      - "internal/**/repo/**"
      - "internal/**/*_repository.go"
      - "internal/**/*_repo.go"
      - "internal/**/store/**"
      - "internal/**/*_store.go"
    name_extraction:
      strip_suffix: [Repository, Repo, Store]
      case: kebab

  - intent: integration
    kb_target: "integrations/{name}.md"
    paths:
      - "internal/**/client/**"
      - "internal/**/*_client.go"
      - "internal/**/external/**"
      - "pkg/**/client/**"
    name_extraction:
      strip_suffix: [Client]
      case: kebab

  - intent: event-messaging
    kb_target: "specs/flows/{name}.events.md"
    paths:
      - "internal/**/consumer/**"
      - "internal/**/*_consumer.go"
      - "internal/**/producer/**"
      - "internal/**/*_producer.go"
      - "internal/**/worker/**"
      - "internal/**/*_worker.go"
      - "internal/**/kafka/**"
      - "internal/**/queue/**"
      - "internal/**/pubsub/**"
    name_extraction:
      strip_suffix: [Consumer, Producer, Worker]
      case: kebab

  - intent: grpc
    kb_target: "integrations/{name}.grpc.md"
    paths:
      - "proto/**/*.proto"
      - "internal/**/*_grpc.go"
      - "internal/**/grpc/**"
      - "api/grpc/**"
    name_extraction:
      strip_suffix: [Server, Client, Service]
      case: kebab

  - intent: dependency
    kb_target: "standards/code/tech-stack.md"
    paths:
      - "go.mod"
      - "go.sum"

  - intent: config
    kb_target: "standards/code/conventions.md"
    paths:
      - ".golangci.yml"
      - ".golangci.yaml"
      - "Makefile"

standards_scaffold:
  - type: tech-stack
  - type: conventions
