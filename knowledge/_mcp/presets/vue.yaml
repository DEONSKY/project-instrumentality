# Vue 3 (Nuxt or plain) code_path_patterns preset
# Copy relevant sections into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  - intent: validation
    kb_target: "validation/common.md"
    paths:
      - "src/validators/**"
      - "src/utils/validators/**"
      - "composables/useValidate*"

  - intent: form
    kb_target: "features/{name}.md"
    paths:
      - "src/components/**Form*.vue"
      - "src/views/**Form*.vue"
      - "pages/**Form*.vue"
    name_extraction:
      strip_suffix: [Form, View, Page, Container, Modal]
      case: kebab

  - intent: api-contract
    kb_target: "features/{name}.api.md"
    paths:
      - "src/api/**"
      - "server/api/**"
      - "src/services/**"
    name_extraction:
      strip_suffix: [Api, Service]
      case: kebab

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "src/models/**"
      - "src/stores/**"
      - "stores/**"

  - intent: service-logic
    kb_target: "flows/{name}.md"
    paths:
      - "src/composables/**"
      - "composables/**"
      - "src/services/**"

  - intent: route-guard
    kb_target: "flows/{name}.guards.md"
    paths:
      - "src/router/**"
      - "router/**"
      - "middleware/**"

  - intent: component
    kb_target: "ui/components.md"
    paths:
      - "src/components/**"
      - "components/**"

  - intent: dependency
    kb_target: "foundation/tech-stack.md"
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".node-version"

  - intent: config
    kb_target: "foundation/conventions.md"
    paths:
      - "tsconfig.json"
      - "tsconfig.*.json"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"

      - "vite.config.*"
      - "nuxt.config.*"
