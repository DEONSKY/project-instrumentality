# Monorepo code_path_patterns preset
# For workspaces with multiple apps (e.g. apps/web, apps/api, packages/*)
# Copy and adapt into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  # Shared packages — always map to shared KB sections
  - intent: validation
    kb_target: "validation/common.md"
    paths:
      - "packages/*/src/validators/**"
      - "packages/validation/**"
      - "packages/shared/src/schemas/**"

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "packages/*/src/models/**"
      - "packages/db/**"
      - "packages/prisma/**"

  # Web app
  - intent: form
    kb_target: "features/{name}.md"
    paths:
      - "apps/web/src/**/*Form*"
      - "apps/web/src/components/**Form*"
    name_extraction:
      strip_suffix: [Form, Page, Screen, Container]
      case: kebab

  - intent: api-contract
    kb_target: "features/{name}.api.md"
    paths:
      - "apps/web/src/api/**"
      - "apps/web/pages/api/**"
      - "apps/web/app/api/**"

  # API / backend app
  - intent: service-logic
    kb_target: "flows/{name}.md"
    paths:
      - "apps/api/src/**/*.service.ts"
      - "apps/api/src/services/**"
      - "apps/backend/src/services/**"

  - intent: route-guard
    kb_target: "flows/{name}.guards.md"
    paths:
      - "apps/api/src/**/*.guard.ts"
      - "apps/api/src/middleware/**"

  - intent: component
    kb_target: "ui/components.md"
    paths:
      - "packages/ui/**"
      - "packages/components/**"
      - "apps/web/src/components/**"

  - intent: dependency
    kb_target: "standards/code/tech-stack.md"
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "package-lock.json"
      - "packages/*/package.json"
      - "apps/*/package.json"

  - intent: config
    kb_target: "standards/code/conventions.md"
    paths:
      - "tsconfig.json"
      - "tsconfig.base.json"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "turbo.json"
      - "nx.json"

standards_scaffold:
  - type: tech-stack
  - type: conventions
