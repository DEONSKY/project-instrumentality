# NestJS code_path_patterns preset
# Copy relevant sections into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  - intent: validation
    kb_target: "validation/common.md"
    paths:
      - "src/**/*.dto.ts"
      - "src/**/*.validator.ts"
      - "src/common/validators/**"

  - intent: api-contract
    kb_target: "features/{name}.api.md"
    paths:
      - "src/**/*.controller.ts"
      - "src/**/controllers/**"
    name_extraction:
      strip_suffix: [Controller]
      case: kebab

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "src/**/*.entity.ts"
      - "src/**/*.schema.ts"
      - "src/**/entities/**"
    name_extraction:
      strip_suffix: [Entity, Schema]
      case: kebab

  - intent: service-logic
    kb_target: "flows/{name}.md"
    paths:
      - "src/**/*.service.ts"
      - "src/**/services/**"
    name_extraction:
      strip_suffix: [Service]
      case: kebab

  - intent: route-guard
    kb_target: "flows/{name}.guards.md"
    paths:
      - "src/**/*.guard.ts"
      - "src/**/*.middleware.ts"
      - "src/common/guards/**"
    name_extraction:
      strip_suffix: [Guard, Middleware]
      case: kebab

  - intent: form
    kb_target: "features/{name}.md"
    paths:
      - "src/**/*.dto.ts"
    name_extraction:
      strip_suffix: [Dto, DTO, CreateDto, UpdateDto, RequestDto]
      case: kebab

  - intent: component
    kb_target: "ui/components.md"
    paths:
      - "src/**/*.module.ts"

  - intent: dependency
    kb_target: "foundation/tech-stack.md"
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".node-version"

  - intent: config
    kb_target: "foundation/conventions.md"
    paths:
      - "tsconfig.json"
      - "tsconfig.*.json"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"

      - "nest-cli.json"
