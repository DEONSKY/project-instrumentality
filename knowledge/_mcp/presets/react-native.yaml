# React Native code_path_patterns preset
# Copy relevant sections into knowledge/_rules.md → code_path_patterns

code_path_patterns:
  - intent: validation
    kb_target: "validation/common.md"
    paths:
      - "src/validators/**"
      - "src/utils/validators/**"
      - "src/schemas/**"

  - intent: form
    kb_target: "features/{name}.md"
    paths:
      - "src/screens/**Form*"
      - "src/components/**Form*"
      - "src/features/**/screens/**"
    name_extraction:
      strip_suffix: [Form, Screen, Page, View, Container, Modal]
      case: kebab

  - intent: api-contract
    kb_target: "features/{name}.api.md"
    paths:
      - "src/api/**"
      - "src/services/api/**"
    name_extraction:
      strip_suffix: [Api, Service]
      case: kebab

  - intent: data-model
    kb_target: "data/schema/{name}.md"
    paths:
      - "src/models/**"
      - "src/store/models/**"
      - "src/database/**"

  - intent: service-logic
    kb_target: "flows/{name}.md"
    paths:
      - "src/services/**"
      - "src/features/**/services/**"

  - intent: route-guard
    kb_target: "flows/{name}.guards.md"
    paths:
      - "src/navigation/**"

  - intent: component
    kb_target: "ui/components.md"
    paths:
      - "src/components/**"
      - "src/ui/**"

  - intent: dependency
    kb_target: "standards/code/tech-stack.md"
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - ".nvmrc"
      - ".node-version"

  - intent: config
    kb_target: "standards/code/conventions.md"
    paths:
      - "tsconfig.json"
      - "tsconfig.*.json"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"

      - "metro.config.*"
      - "app.json"
      - "app.config.*"

standards_scaffold:
  - type: tech-stack
  - type: conventions
